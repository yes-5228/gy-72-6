services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: canteen
      POSTGRES_USER: canteen
      POSTGRES_PASSWORD: canteen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canteen -d canteen"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080"
      DATABASE_URL: "postgresql://canteen:canteen@db:5432/canteen"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
